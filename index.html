<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="stylesheet" href="style.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Portfolio</title>
</head>
<body>
<header>
<h1>Bienvenue sur mon Portfolio</h1>
<p>Je suis étudiant en Génie Informatique et Programmation</p>
</header>
<main>
<section id="apropos">
<h2>À propos de moi</h2>
<p>Écrivez ici une courte présentation de vous-même.</p>
</section>
<section id="contact">
<h2>Me Contacter</h2>
<form>
<div class="champ">
<label for="nom">Votre nom :</label>
<input type="text" id="nom" placeholder="Jean Dupont">
</div>
<div class="champ">
<label for="email">Votre email :</label>
<input type="email" id="email" placeholder="jean@exemple.com">
</div>
<div class="champ">
<label for="message">Message :</label>
<textarea id="message" rows="4"></textarea>
</div>
<button type="submit">Envoyer</button>
</form>
</section>
</main>
<footer>
<p>© 2025 - Mon Portfolio</p>
</footer>
</body>
</html>
